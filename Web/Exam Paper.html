<script>

function updateSubjects(){

let stream=document.getElementById("stream").value;
let subject=document.getElementById("subject");

subject.innerHTML="<option value=''>Select Subject</option>";

let options=[];

if(stream=="Science"){
options=["Biology","Chemistry","Physics","ICT"];
}

else if(stream=="Technology"){
options=["ET (Engineering Technology)","BST (Bio System Technology)","SFT (Science For Technology)"];
}

else if(stream=="Commerce"){
options=["E-con","Accounting","BS"];
}

else if(stream=="Arts"){
options=["ICT","E-con","Accounting"];
}

options.forEach(function(item){
let op=document.createElement("option");
op.text=item;
subject.add(op);
});

subject.disabled=false;
}

function enablePaper(){
document.getElementById("paper").disabled=false;
}

function enableYear(){
document.getElementById("year").disabled=false;
}

function showQuestionInput(){
document.getElementById("questions").disabled=false;
}

function calculateTime(){

let q=document.getElementById("questions").value;

let time=q*2.4;

document.getElementById("time").innerHTML="Time Needed : "+time+" minutes";

document.getElementById("submitBtn").style.display="block";
}

</script>





<form class="form">

	<b><h2 >Choose Your Paper&nbsp;&nbsp;</h2></b>

<label>Stream</label>
<select id="stream" onchange="updateSubjects()">
<option value="" hidden="">Select Stream</option>
<option>Science</option>
<option>Technology</option>
<option>Commerce</option>
<option>Arts</option>
</select>

<label>Subject</label>
<select id="subject" disabled onchange="enablePaper()"></select>

<label>Paper Type</label>
<select id="paper" disabled onchange="enableYear()">
<option value="" hidden="">Select Paper Type</option>
<option>Past Paper</option>
<option>Model Paper</option>
<option>Target Paper</option>
</select>

<label>Year</label>
<select id="year" disabled onchange="showQuestionInput()">
<option value="" hidden="">Select Year</option>
<option>2020</option>
<option>2021</option>
<option>2022</option>
<option>2023</option>
<option>2024</option>
</select>

<label>Number of Questions</label>
<input type="number" id="questions" disabled oninput="calculateTime()">

<div id="time"></div>

<button id="submitBtn" style="display:none;">Submit</button>

</form>
